server {
    listen 80;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
       
        try_files $uri $uri/ /index.html;
    }

    location /api/main/ {

        proxy_pass http://server:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ai/ {

        proxy_pass http://server2:3001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}